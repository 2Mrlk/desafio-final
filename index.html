<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo do Zodíaco - Armadura de Ouro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Oráculo do Zodíaco</h1>
            <p>Descubra o Cavaleiro de Ouro que rege o seu destino.</p>
        </header>

        <section class="card">
            <div class="input-group">
                <label for="data-nascimento" class="sr-only">Digite sua Data de Nascimento</label>
                <input type="date" id="data-nascimento" required>
                <button onclick="revelarOraculo()">Descobrir</button>
            </div>
            <div id="resultado" class="resultado-oculto">
                <div class="simbolo-cavaleiro" id="simbolo-cavaleiro"></div>
                <h2 id="nome-cavaleiro"></h2>
                <p id="poder-cavaleiro"></p>
                <p id="status-cavaleiro"></p>
                <img id="imagem-cavaleiro" src="" alt="Imagem do Cavaleiro">
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
